name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: |
          for file in src/*.mjs test/*.mjs; do
            node --check "$file"
          done
      - run: npm pack --dry-run
